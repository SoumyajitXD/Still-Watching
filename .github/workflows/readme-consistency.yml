name: Repository Consistency Check

on:
  push:
    paths:
      - "README.md"
      - "installation-guide.md"
      - "curseforge-description.html"
      - ".github/scripts/validate.py"
      - ".github/workflows/readme-consistency.yml"
  pull_request:
    paths:
      - "README.md"
      - "installation-guide.md"
      - "curseforge-description.html"
      - ".github/scripts/validate.py"
      - ".github/workflows/readme-consistency.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-consistency-${{ github.ref }}
  cancel-in-progress: true

jobs:
  consistency:
    name: Check project facts
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check --quiet PyYAML

      - name: Check required project facts
        run: python .github/scripts/validate.py project-facts
