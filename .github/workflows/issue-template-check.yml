name: Issue Template Check

on:
  push:
    paths:
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/scripts/validate.py"
      - ".github/workflows/issue-template-check.yml"
  pull_request:
    paths:
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/scripts/validate.py"
      - ".github/workflows/issue-template-check.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: issue-template-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Validate issue forms
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check --quiet PyYAML

      - name: Validate issue template config and forms
        run: python .github/scripts/validate.py issue-templates
