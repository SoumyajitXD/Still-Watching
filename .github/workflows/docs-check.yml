name: Docs Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate repository files
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show repository structure
        run: |
          find . -maxdepth 3 -type f | sort

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Validate YAML issue templates and workflows
        run: |
          python - <<'PY'
          import pathlib
          import sys
          import yaml

          failed = False
          roots = [pathlib.Path('.github/ISSUE_TEMPLATE'), pathlib.Path('.github/workflows')]

          for root in roots:
              if not root.exists():
                  continue

              for path in sorted(list(root.rglob('*.yml')) + list(root.rglob('*.yaml'))):
                  try:
                      yaml.safe_load(path.read_text(encoding='utf-8'))
                      print(f'OK: {path}')
                  except Exception as exc:
                      print(f'YAML ERROR: {path}: {exc}')
                      failed = True

          sys.exit(1 if failed else 0)
          PY

      - name: Validate HTML files can be parsed
        run: |
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import sys

          class Parser(HTMLParser):
              pass

          failed = False
          for path in sorted(Path('.').glob('*.html')):
              try:
                  Parser().feed(path.read_text(encoding='utf-8-sig'))
                  print(f'OK: {path}')
              except Exception as exc:
                  print(f'HTML ERROR: {path}: {exc}')
                  failed = True

          sys.exit(1 if failed else 0)
          PY

      - name: Check required repository files exist
        run: |
          test -f README.md
          test -f installation-guide.md
          test -f latest-modlist.html
          test -f curseforge-description.html
          test -f LICENSE
          test -d .github/ISSUE_TEMPLATE
          test -d Screenshots
          test -d Releases
