name: Docs Check

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "installation-guide.md"
      - "curseforge-description.html"
      - "latest-modlist.html"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/scripts/validate.py"
      - ".github/workflows/docs-check.yml"
  pull_request:
    paths:
      - "README.md"
      - "installation-guide.md"
      - "curseforge-description.html"
      - "latest-modlist.html"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/scripts/validate.py"
      - ".github/workflows/docs-check.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate repository docs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check --quiet PyYAML

      - name: Check required repository layout
        run: python .github/scripts/validate.py layout

      - name: Validate YAML syntax
        run: python .github/scripts/validate.py yaml

      - name: Validate HTML files
        run: python .github/scripts/validate.py html
