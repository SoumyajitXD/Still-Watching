name: Sponsor Guard

on:
  push:
    paths:
      - "README.md"
      - ".github/workflows/sponsor-guard.yml"
  pull_request:
    paths:
      - "README.md"
      - ".github/workflows/sponsor-guard.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sponsor-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  protect-bisecthosting-sponsor:
    name: Protect BisectHosting sponsor block
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Require BisectHosting banner and link in README
        shell: bash
        run: |
          set -euo pipefail

          required_link="https://url-shortener.curseforge.com/AZDOs"
          required_banner="https://media.forgecdn.net/attachments/description/1420406/description_0434b1be-41ee-4fa8-a2f5-177b2fe87c95.png"
          required_start="<!-- sponsor:bisecthosting:start -->"
          required_end="<!-- sponsor:bisecthosting:end -->"

          for needle in "$required_link" "$required_banner" "$required_start" "$required_end"; do
            if ! grep -Fq "$needle" README.md; then
              echo "::error file=README.md::Missing required BisectHosting sponsor marker or asset: $needle"
              echo "Do not remove the BisectHosting sponsor banner/link from README.md. Restore the guarded block before merging."
              exit 1
            fi
          done

          python - <<'PY'
          from pathlib import Path
          text = Path('README.md').read_text(encoding='utf-8')
          start = '<!-- sponsor:bisecthosting:start -->'
          end = '<!-- sponsor:bisecthosting:end -->'
          link = 'https://url-shortener.curseforge.com/AZDOs'
          banner = 'https://media.forgecdn.net/attachments/description/1420406/description_0434b1be-41ee-4fa8-a2f5-177b2fe87c95.png'
          if text.count(start) < 1 or text.count(end) < 1:
              raise SystemExit('README.md must contain at least one complete BisectHosting sponsor block.')
          blocks = []
          cursor = 0
          while True:
              left = text.find(start, cursor)
              if left == -1:
                  break
              right = text.find(end, left)
              if right == -1:
                  raise SystemExit('BisectHosting sponsor block start marker has no matching end marker.')
              blocks.append(text[left:right + len(end)])
              cursor = right + len(end)
          if not any(link in block and banner in block for block in blocks):
              raise SystemExit('No BisectHosting sponsor block contains both the required link and banner image.')
          print('BisectHosting sponsor guard OK')
          PY
