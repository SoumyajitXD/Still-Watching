name: Link Check

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "30 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: link-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  links:
    name: Check documented links
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Markdown and HTML links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --max-retries 2
            --retry-wait-time 5
            --timeout 20
            --accept 200,204,206,301,302,303,307,308,403,406,418,429,999
            --exclude '^https://www\.curseforge\.com/'
            --exclude '^https://media\.forgecdn\.net/'
            README.md
            installation-guide.md
            curseforge-description.html
            latest-modlist.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
