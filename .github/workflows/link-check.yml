name: Link Check

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "30 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    name: Check links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check Markdown and HTML links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --accept 200,204,206,301,302,403,429
            README.md
            installation-guide.md
            curseforge-description.html
            latest-modlist.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
