name: Release ZIP Audit

on:
  push:
    paths:
      - "Releases/**"
      - ".github/scripts/validate.py"
      - ".github/workflows/release-zip-audit.yml"
  pull_request:
    paths:
      - "Releases/**"
      - ".github/scripts/validate.py"
      - ".github/workflows/release-zip-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-zip-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit release ZIPs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check --quiet PyYAML

      - name: Audit ZIP archives
        run: python .github/scripts/validate.py release-zips
