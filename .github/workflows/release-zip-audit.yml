name: Release ZIP Audit

on:
  push:
    paths:
      - "Releases/**"
      - ".github/workflows/release-zip-audit.yml"
  pull_request:
    paths:
      - "Releases/**"
      - ".github/workflows/release-zip-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-zip-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit release ZIPs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Audit ZIP archives
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import sys
          import zipfile

          release_dir = Path('Releases')
          if not release_dir.is_dir():
              print('Releases directory is missing')
              sys.exit(1)

          zips = sorted(release_dir.glob('*.zip'))
          if not zips:
              print('No release ZIPs found in Releases/.')
              sys.exit(0)

          failed = False

          for archive in zips:
              print(f'\nArchive: {archive}')
              try:
                  with zipfile.ZipFile(archive) as zf:
                      infos = zf.infolist()
                      bad = zf.testzip()

                      if bad:
                          print(f'ERROR: corrupt entry: {bad}')
                          failed = True

                      names = [info.filename for info in infos]
                      lower_names = [name.lower() for name in names]
                      has_manifest = 'manifest.json' in lower_names
                      has_overrides = any(name == 'overrides/' or name.startswith('overrides/') for name in lower_names)

                      print(f'entries: {len(infos)}')
                      print(f'manifest.json: {"yes" if has_manifest else "no"}')
                      print(f'overrides/: {"yes" if has_overrides else "no"}')

                      if not infos:
                          print('ERROR: archive is empty')
                          failed = True

                      if not has_manifest:
                          print('WARNING: no manifest.json; archive may not be directly CurseForge-importable')

                      if not has_overrides:
                          print('WARNING: no overrides/ directory; this is fine only if the archive is not meant to include overrides')

              except zipfile.BadZipFile:
                  print('ERROR: unreadable or corrupt ZIP')
                  failed = True

          sys.exit(1 if failed else 0)
          PY
