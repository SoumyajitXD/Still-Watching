name: Modlist Check

on:
  push:
    paths:
      - "latest-modlist.html"
      - ".github/scripts/validate.py"
      - ".github/workflows/modlist-check.yml"
  pull_request:
    paths:
      - "latest-modlist.html"
      - ".github/scripts/validate.py"
      - ".github/workflows/modlist-check.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: modlist-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Validate latest modlist
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check --quiet PyYAML

      - name: Parse and validate modlist links
        run: python .github/scripts/validate.py modlist
