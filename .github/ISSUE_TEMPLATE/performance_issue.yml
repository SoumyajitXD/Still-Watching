name: Performance issue
description: FPS, stutter, freezes, memory, startup/load time, TPS/MSPT, or profiling reports.
title: "[Performance]: "
labels:
  - performance
  - needs-triage

body:
  - type: markdown
    attributes:
      value: |
        Use this for measurable performance problems: FPS drops, stutter, freezes, memory pressure, load time, server TPS/MSPT, or profiling.

        Bring numbers. "Laggy" is not a bug report; it is a weather report for your PC. FPS, TPS, MSPT, memory use, render distance, player count, logs, and profiler/spark reports are useful.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I tested this on the latest available Still Watching version.
          required: true
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I reproduced this without extra mods, shaders, resource packs, datapacks, or config edits unless listed below.
          required: true

  - type: dropdown
    id: performance-problem-type
    attributes:
      label: Performance problem type
      options:
        - Low FPS
        - Stuttering or frame spikes
        - Freezing/hanging
        - Long startup/load time
        - High memory usage or garbage collection spikes
        - Server TPS/MSPT lag
        - Network/desync lag
        - Other
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Singleplayer
        - Multiplayer client
        - LAN
        - Dedicated server
    validations:
      required: true

  - type: input
    id: pack-version
    attributes:
      label: Still Watching version
      description: Use the CurseForge file/version shown by your launcher or server pack.
      placeholder: "Example: V1.0.x / CurseForge file name"
    validations:
      required: true

  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft version
      placeholder: "1.20.1"
    validations:
      required: true

  - type: input
    id: forge-version
    attributes:
      label: Forge version
      placeholder: "Forge 47.x.x"
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: "Java 17"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS / Linux distro"
    validations:
      required: true

  - type: textarea
    id: hardware
    attributes:
      label: Hardware
      description: CPU, GPU, total RAM, storage type, and whether this is a laptop/desktop/server.
      placeholder: |
        CPU:
        GPU:
        Total RAM:
        Storage:
        Laptop/desktop/server:
    validations:
      required: true

  - type: input
    id: allocated-memory
    attributes:
      label: Allocated memory
      placeholder: "Example: 6 GB / 6144 MB"
    validations:
      required: true

  - type: input
    id: render-distance
    attributes:
      label: Render distance
      placeholder: "Example: 8 chunks"
    validations:
      required: true

  - type: input
    id: simulation-distance
    attributes:
      label: Simulation distance
      placeholder: "Example: 6 chunks"
    validations:
      required: true

  - type: textarea
    id: shaders-resource-packs
    attributes:
      label: Shaders and resource packs
      description: Write "None" if disabled. Include shader preset/settings if used.
      placeholder: |
        Shaders:
        Resource packs:
    validations:
      required: true

  - type: textarea
    id: measurements
    attributes:
      label: Measurements
      description: Fill the lines that apply. Numbers, not vibes.
      placeholder: |
        FPS normal/problem:
        TPS:
        MSPT:
        Memory usage:
        Startup/load time:
        Player count:
        Network ping/desync notes:
    validations:
      required: true

  - type: textarea
    id: trigger-location-context
    attributes:
      label: Trigger, location, or context
      description: Describe dimension, biome, structure, mob/event, action, time played, player count, or server location before the issue appears.
      placeholder: "It happens when..."
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Load world/server
        2. Go to...
        3. Do...
        4. FPS/TPS/MSPT drops to...
    validations:
      required: true

  - type: textarea
    id: logs-profiler
    attributes:
      label: Logs, profiler, or spark report
      description: Attach latest.log and profiler/spark reports when available. Server TPS/MSPT issues need profiling if possible; otherwise we are hunting a ghost with a spoon.
      placeholder: "Drag and drop logs/reports here, or paste links."
    validations:
      required: true

  - type: textarea
    id: extra-content
    attributes:
      label: Extra mods, shaders, resource packs, datapacks, or config edits
      description: Write "None" if the install/server is clean. List both added and removed content.
      placeholder: "None"
    validations:
      required: true
