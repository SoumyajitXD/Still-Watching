name: Performance issue
description: Report FPS drops, freezes, stuttering, memory pressure, server TPS loss, or excessive load times.
title: "[Performance]: "
labels:
  - performance
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Use this for measurable performance problems.

        Include numbers: FPS, TPS, MSPT, memory use, render distance, player count, location, and reproduction steps.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I tested this on the latest available Still Watching release from CurseForge.
          required: true
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I reproduced this without extra mods, shaders, resource packs, datapacks, or config edits unless listed below.
          required: true
        - label: I included actual measurements, not only a general description.
          required: true
  - type: dropdown
    id: performance-type
    attributes:
      label: Performance problem
      options:
        - Low FPS
        - Stuttering or frame spikes
        - Freezing or hanging
        - Long startup or world load time
        - High memory usage or garbage collection spikes
        - Server TPS or MSPT lag
        - Network or desync lag
        - Other
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Singleplayer
        - Multiplayer client
        - LAN
        - Dedicated server
    validations:
      required: true
  - type: input
    id: pack-version
    attributes:
      label: Still Watching version
      placeholder: "Example: V1.0.x"
    validations:
      required: true
  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft version
      placeholder: "1.20.1"
    validations:
      required: true
  - type: input
    id: forge-version
    attributes:
      label: Forge version
      placeholder: "Forge 47.x.x"
  - type: input
    id: hardware
    attributes:
      label: Hardware
      description: CPU, GPU, RAM, and storage type if known.
      placeholder: "CPU / GPU / RAM / SSD or HDD"
    validations:
      required: true
  - type: input
    id: allocated-memory
    attributes:
      label: Allocated memory
      placeholder: "Example: 6 GB / 6144 MB"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS / Linux distro"
    validations:
      required: true
  - type: textarea
    id: settings
    attributes:
      label: Relevant settings
      description: Include render distance, simulation distance, shaders, resource packs, graphics settings, JVM args, and server view distance if relevant.
      placeholder: |
        Render distance:
        Simulation distance:
        Shaders/resource packs:
        Graphics settings:
        JVM args:
        Server view distance:
    validations:
      required: true
  - type: textarea
    id: measurements
    attributes:
      label: Measurements
      description: Give before/after or normal/problem numbers where possible.
      placeholder: |
        FPS before/problem:
        Server TPS/MSPT:
        Memory usage:
        Startup/load time:
        Number of players:
    validations:
      required: true
  - type: textarea
    id: trigger
    attributes:
      label: When does it happen?
      description: Describe the location, dimension, biome, structure, mob/event, action, or time played before the issue appears.
      placeholder: "It happens when..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Load world/server
        2. Go to...
        3. Do...
        4. FPS/TPS drops to...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, spark report, or profiler output
      description: Attach latest.log and profiler/spark reports if available. Server TPS issues need profiling data where possible.
      placeholder: "Drag and drop logs/reports here, or paste links."
    validations:
      required: true
  - type: textarea
    id: modifications
    attributes:
      label: Extra mods, shaders, resource packs, datapacks, or config changes
      description: Write "None" if the install is clean.
      placeholder: "None"
    validations:
      required: true
