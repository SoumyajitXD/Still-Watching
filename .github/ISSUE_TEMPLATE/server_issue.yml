name: Server issue
description: Dedicated server, LAN, hosted server, connection, mismatch, or multiplayer-only behavior.
title: "[Server]: "
labels:
  - server
  - multiplayer
  - needs-triage

body:
  - type: markdown
    attributes:
      value: |
        Use this for dedicated servers, LAN, hosted servers, connection errors, client/server mismatches, and bugs that only happen in multiplayer.

        Crashes go in Crash report when the client/server terminates. FPS/TPS/MSPT investigations go in Performance issue unless the problem is clearly server setup or mismatch. Client and server versions must match unless a release note says otherwise.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: Client and server are using the same Still Watching version unless noted below.
          required: true
        - label: Client and server are using Minecraft 1.20.1.
          required: true
        - label: Client and server are using the required Forge version for this pack release.
          required: true

  - type: dropdown
    id: server-type
    attributes:
      label: Server type
      options:
        - Dedicated server
        - Hosted server/provider
        - LAN
        - Multiplayer client joining server
        - Other
    validations:
      required: true

  - type: input
    id: host-provider
    attributes:
      label: Host/provider
      description: Write "Self-hosted" if you run it yourself.
      placeholder: "Example: Self-hosted / Apex / Bisect / Other"
    validations:
      required: true

  - type: dropdown
    id: server-pack-source
    attributes:
      label: Server pack source
      options:
        - CurseForge server pack
        - Host one-click installer
        - Manually built from CurseForge client pack
        - Other
    validations:
      required: true

  - type: input
    id: client-pack-version
    attributes:
      label: Client pack version
      placeholder: "Example: V1.0.x / CurseForge file name"
    validations:
      required: true

  - type: input
    id: server-pack-version
    attributes:
      label: Server pack version
      placeholder: "Example: V1.0.x / CurseForge file name"
    validations:
      required: true

  - type: input
    id: forge-version
    attributes:
      label: Forge version
      placeholder: "Forge 47.x.x"
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: "Java 17"
    validations:
      required: true

  - type: input
    id: server-ram
    attributes:
      label: Server RAM
      placeholder: "Example: 6 GB"
    validations:
      required: true

  - type: input
    id: client-ram
    attributes:
      label: Client allocated RAM
      placeholder: "Example: 6 GB / 6144 MB"
    validations:
      required: true

  - type: input
    id: player-count
    attributes:
      label: Player count when issue happened
      placeholder: "Example: 1/10, 4/20"
    validations:
      required: true

  - type: dropdown
    id: affected-side
    attributes:
      label: Affected side
      options:
        - Client
        - Server
        - Both
        - Unknown
    validations:
      required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: Issue type
      options:
        - Server will not start
        - Client cannot connect
        - Missing mod or config mismatch
        - Server crash
        - Client crash when joining
        - Severe TPS/MSPT lag
        - Multiplayer-only gameplay bug
        - LAN issue
        - Commands/permissions issue
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: "Describe the server or multiplayer problem clearly."
    validations:
      required: true

  - type: textarea
    id: expected-result
    attributes:
      label: Expected result
      placeholder: "I expected..."
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start server/LAN
        2. Join with matching client
        3. Do...
        4. Issue happens
    validations:
      required: true

  - type: textarea
    id: server-logs
    attributes:
      label: Server log or crash report
      description: Required. Attach or link server latest.log, debug.log, or crash report. Full files beat tiny screenshots every time.
      placeholder: "Drag and drop server logs here, or paste a link."
    validations:
      required: true

  - type: textarea
    id: client-logs
    attributes:
      label: Client log or crash report
      description: Required when the client cannot connect, crashes, disconnects, or shows a mismatch/error screen.
      placeholder: "Drag and drop client logs here, or paste a link."

  - type: textarea
    id: server-client-modifications
    attributes:
      label: Server/client modifications
      description: List extra mods, removed mods, edited configs, plugins, datapacks, host panel changes, or mismatched files. Write "None" for clean client/server.
      placeholder: |
        Server changes:
        Client changes:
    validations:
      required: true

  - type: checkboxes
    id: client-only-mod-check
    attributes:
      label: Client-only mod check
      options:
        - label: I checked that the dedicated server does not contain client-only content such as shader loaders, minimaps, HUD-only mods, rendering/performance client mods, or resource-pack-only visual helpers.
          required: true
