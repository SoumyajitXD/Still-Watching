name: Feature or content request
description: Suggest a modpack feature, content change, balance pass, compatibility improvement, or quality-of-life idea.
title: "[Feature]: "
labels:
  - enhancement
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Use this for actionable improvements to Still Watching.

        Keep suggestions focused. A clear proposal with tradeoffs is useful. A vague wish list is not.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I searched existing issues and discussions for this idea.
          required: true
        - label: This request fits Still Watching as a Forge 1.20.1 horror-survival modpack.
          required: true
        - label: This is not a bug report, crash report, install issue, server issue, or support question.
          required: true
  - type: dropdown
    id: request-type
    attributes:
      label: Request type
      options:
        - New mod or content addition
        - Remove or replace existing content
        - Balance/tuning change
        - Compatibility improvement
        - Quality-of-life improvement
        - Quest/progression change
        - Audio/visual/atmosphere change
        - Documentation or metadata improvement
        - Other
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: Expected impact
      options:
        - Small polish
        - Noticeable improvement
        - Major gameplay change
        - Breaking or risky change
        - Unsure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What is weak, missing, confusing, too easy, too punishing, or worth improving?
      placeholder: "Currently..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the actual change you want.
      placeholder: "I suggest..."
    validations:
      required: true
  - type: textarea
    id: fit
    attributes:
      label: Why does this fit Still Watching?
      description: Explain how it improves horror, survival, progression, atmosphere, stability, accessibility, or multiplayer.
      placeholder: "This fits because..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention other approaches, mods, configs, or smaller changes that could solve the same problem.
      placeholder: "Alternatives include..."
  - type: textarea
    id: risks
    attributes:
      label: Risks or tradeoffs
      description: Consider performance, balance, horror pacing, server compatibility, licensing, mod conflicts, and world safety.
      placeholder: "Possible downsides..."
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Link mod pages, screenshots, videos, configs, changelogs, or examples if relevant.
      placeholder: "Links or examples..."
