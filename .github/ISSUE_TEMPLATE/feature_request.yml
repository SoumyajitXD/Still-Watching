name: Feature or content request
description: Thoughtful modpack change proposal, not random cool-mod soup.
title: "[Request]: "
labels:
  - enhancement
  - needs-triage

body:
  - type: markdown
    attributes:
      value: |
        Use this for thoughtful changes to Still Watching: mods, configs, quests, structures, mobs, items, ambience, accessibility, documentation, or balance.

        This is not a dumping ground for every mod that looked cool at 2 AM. The pack needs horror, atmosphere, survival pressure, progression, and multiplayer stability.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I searched existing issues and did not find this suggestion already posted.
          required: true
        - label: I checked that this request fits Still Watching's horror-survival identity.
          required: true
        - label: I am not asking for support, a crash fix, or help installing the pack.
          required: true
        - label: This is not just "add this random cool mod"; I explain fit, tradeoffs, and impact below.
          required: true

  - type: dropdown
    id: request-category
    attributes:
      label: Request category
      options:
        - New mod
        - Remove/replace mod
        - Config/balance
        - Quest/progression
        - Structure/worldgen
        - Mob/entity behavior
        - Item/block/recipe
        - Horror/ambience/audio
        - Accessibility/QOL
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem-being-solved
    attributes:
      label: Problem being solved
      description: Explain the gap, annoyance, imbalance, missing experience, or unclear documentation.
      placeholder: "Currently, the pack..."
    validations:
      required: true

  - type: textarea
    id: proposed-change
    attributes:
      label: Proposed change
      description: Be specific. Name the mod, config, quest, mechanic, structure, item, or document section and describe what should change.
      placeholder: "I suggest adding/changing/removing..."
    validations:
      required: true

  - type: textarea
    id: fit
    attributes:
      label: Why this fits Still Watching
      description: Explain why this belongs in a Forge 1.20.1 horror-survival modpack instead of just being neat.
      placeholder: "This fits because..."
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Effect on horror, survival, progression, and multiplayer
      description: Say how this changes atmosphere, difficulty, survival pressure, progression, server play, or co-op balance.
      placeholder: |
        Horror/atmosphere:
        Survival pressure:
        Progression:
        Multiplayer/server impact:
    validations:
      required: true

  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs, risks, or compatibility concerns
      description: Mention performance cost, balance problems, dependencies, conflicts, licensing, server compatibility, update risk, or known bugs.
      placeholder: "Possible downside: ..."
    validations:
      required: true

  - type: textarea
    id: links-examples
    attributes:
      label: Links, examples, or screenshots
      description: Add CurseForge/mod pages, docs, videos, screenshots, issue links, or examples if relevant.
      placeholder: "Links/examples here."
