name: Crash report
description: Report a Still Watching client or server crash with logs and reproduction steps.
title: "[Crash]: "
labels:
  - crash
  - needs-triage

body:
  - type: markdown
    attributes:
      value: |
        Use this when the game or server crashes. Attach the full crash report and latest.log.

        A useful crash report includes logs, versions, reproduction context, and any clean-install testing you performed.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I tested this on the latest available Still Watching version.
          required: true
        - label: I tested this on a clean Still Watching profile without extra mods, shaders, resource packs, or config edits unless listed below.
          required: true

  - type: dropdown
    id: crash-type
    attributes:
      label: Crash type
      options:
        - Game will not launch
        - Crash during loading
        - Crash when creating/loading a world
        - Crash during gameplay
        - Crash when joining server
        - Dedicated server crash
        - Other
    validations:
      required: true

  - type: input
    id: pack-version
    attributes:
      label: Still Watching version
      placeholder: "V1.0.x"
    validations:
      required: true

  - type: dropdown
    id: launcher
    attributes:
      label: Launcher
      options:
        - CurseForge App
        - Prism Launcher
        - ATLauncher
        - Modrinth App
        - Other
    validations:
      required: true

  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft version
      placeholder: "1.20.1"
    validations:
      required: true

  - type: input
    id: forge-version
    attributes:
      label: Forge version
      placeholder: "Forge 47.x.x"

  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: "Java 17"
    validations:
      required: true

  - type: input
    id: allocated-memory
    attributes:
      label: Allocated memory
      placeholder: "Example: 6 GB / 6144 MB"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS / Linux distro"
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Singleplayer
        - Multiplayer client
        - LAN
        - Dedicated server
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened before the crash?
      placeholder: |
        Example: I clicked Play, Forge loaded to 70%, then it crashed.
        Example: I entered a cave structure and the game crashed.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch the pack
        2. Open/create world
        3. Do...
        4. Crash happens
    validations:
      required: true

  - type: textarea
    id: crash-report
    attributes:
      label: Crash report
      description: Attach or link the full file from crash-reports/. Review it for private information first.
      placeholder: "Drag and drop the crash report here, or paste a link."
    validations:
      required: true

  - type: textarea
    id: latest-log
    attributes:
      label: latest.log
      description: Attach or link logs/latest.log. Include the full relevant file, not only the last few lines.
      placeholder: "Drag and drop latest.log here, or paste a link."
    validations:
      required: true

  - type: textarea
    id: modifications
    attributes:
      label: Extra mods, shaders, resource packs, or config changes
      description: Write "None" if the install is clean.
      placeholder: "None"
    validations:
      required: true
