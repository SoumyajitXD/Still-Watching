name: Crash report
description: Client or server terminates/crashes. Full crash report and latest.log required.
title: "[Crash]: "
labels:
  - crash
  - needs-triage

body:
  - type: markdown
    attributes:
      value: |
        Use this when the game client or dedicated server terminates, closes, or throws a crash report.

        Do not post cropped screenshots of logs. Attach the full crash report and latest.log as files or links. Screenshots hide the useful part and make debugging miserable.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I tested this on the latest available Still Watching version.
          required: true
        - label: I tested this on a clean Still Watching profile/server without extra mods, shaders, resource packs, datapacks, or config edits unless listed below.
          required: true

  - type: dropdown
    id: crash-type
    attributes:
      label: Crash type
      options:
        - Game will not launch
        - Crash during mod loading
        - Crash creating/loading world
        - Crash during gameplay
        - Crash joining server
        - Dedicated server crash
        - Other
    validations:
      required: true

  - type: dropdown
    id: affected-side
    attributes:
      label: Affected side
      options:
        - Client
        - Server
        - Both
        - Unknown
    validations:
      required: true

  - type: dropdown
    id: clean-install-tested
    attributes:
      label: Clean install tested?
      options:
        - "Yes"
        - "No"
        - Partially
    validations:
      required: true

  - type: input
    id: pack-version
    attributes:
      label: Still Watching version
      description: Use the CurseForge file/version shown by your launcher or server pack.
      placeholder: "Example: V1.0.x / CurseForge file name"
    validations:
      required: true

  - type: dropdown
    id: official-source
    attributes:
      label: Official source
      options:
        - CurseForge App
        - CurseForge ZIP/manual import
        - Server pack from CurseForge
        - Other
    validations:
      required: true

  - type: dropdown
    id: launcher
    attributes:
      label: Launcher
      options:
        - CurseForge App
        - Prism Launcher
        - ATLauncher
        - Modrinth App
        - Dedicated server
        - Other
    validations:
      required: true

  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft version
      placeholder: "1.20.1"
    validations:
      required: true

  - type: input
    id: forge-version
    attributes:
      label: Forge version
      placeholder: "Forge 47.x.x"
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: "Java 17"
    validations:
      required: true

  - type: input
    id: allocated-memory
    attributes:
      label: Allocated memory
      placeholder: "Example: 6 GB / 6144 MB"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS / Linux distro"
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Singleplayer
        - Multiplayer client
        - LAN
        - Dedicated server
    validations:
      required: true

  - type: textarea
    id: what-happened-before-crash
    attributes:
      label: What happened before the crash?
      placeholder: |
        Example: I clicked Play, Forge loaded to 70%, then it crashed.
        Example: I entered a cave structure and the game crashed.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch the pack/server
        2. Open/create world or join server
        3. Do...
        4. Crash happens
    validations:
      required: true

  - type: textarea
    id: crash-report
    attributes:
      label: Crash report
      description: Required. Attach or link the full file from crash-reports/. Review it for private information first. Do not upload cropped screenshots.
      placeholder: "Drag and drop the full crash report here, or paste a link."
    validations:
      required: true

  - type: textarea
    id: latest-log
    attributes:
      label: latest.log
      description: Required. Attach or link logs/latest.log. Include the full relevant file, not only the final lines.
      placeholder: "Drag and drop latest.log here, or paste a link."
    validations:
      required: true

  - type: textarea
    id: extra-content
    attributes:
      label: Extra mods, shaders, resource packs, datapacks, or config edits
      description: Write "None" if the install/server is clean. List both added and removed content.
      placeholder: "None"
    validations:
      required: true
