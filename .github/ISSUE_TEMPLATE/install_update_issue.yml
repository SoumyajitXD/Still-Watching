name: Installation or update issue
description: Install, import, update, dependency resolution, launcher profile, or first-launch failure.
title: "[Install]: "
labels:
  - installation
  - needs-triage

body:
  - type: markdown
    attributes:
      value: |
        Use this only for problems before normal gameplay starts: install, import, update, launcher profile creation, dependency resolution, or first launch.

        The GitHub ZIP is not the playable modpack. Use the official CurseForge release. If you installed from a random mirror or edited ZIP, that is not a supported setup.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I downloaded the pack from CurseForge or another official Still Watching source.
          required: true
        - label: I followed the installation guide before opening this issue.
          required: true
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I understand the GitHub ZIP is not a supported playable install source.
          required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: Issue type
      options:
        - Cannot import pack
        - Download fails
        - Update fails
        - Missing files after install
        - Launcher profile will not create
        - Launcher profile created but will not launch
        - Dependency/mod resolution issue
        - First launch fails
        - Other
    validations:
      required: true

  - type: dropdown
    id: official-source
    attributes:
      label: Official source
      options:
        - CurseForge App
        - CurseForge ZIP/manual import
        - Other
    validations:
      required: true

  - type: input
    id: pack-version
    attributes:
      label: Still Watching version / CurseForge file
      description: Use the exact CurseForge file/version shown.
      placeholder: "Example: V1.0.x / CurseForge file name"
    validations:
      required: true

  - type: dropdown
    id: launcher
    attributes:
      label: Launcher
      options:
        - CurseForge App
        - Prism Launcher
        - ATLauncher
        - Modrinth App
        - Other
    validations:
      required: true

  - type: input
    id: launcher-version
    attributes:
      label: Launcher version
      description: Required when available. If the launcher does not show a version, write "Not shown".
      placeholder: "Example: CurseForge 1.x / Prism 9.x / Not shown"
    validations:
      required: true

  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft version shown by launcher
      placeholder: "1.20.1"
    validations:
      required: true

  - type: input
    id: forge-version
    attributes:
      label: Forge version shown by launcher
      placeholder: "Forge 47.x.x"
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: "Java 17"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS / Linux distro"
    validations:
      required: true

  - type: textarea
    id: exact-error-message
    attributes:
      label: Exact error message
      description: Paste the exact launcher/game error. Do not summarize the one sentence that matters into mush.
      placeholder: "Paste the full error text here."
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe where the process failed and what you clicked before it failed.
      placeholder: "The launcher shows..."
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open launcher
        2. Import/update Still Watching
        3. Click...
        4. Error appears
    validations:
      required: true

  - type: textarea
    id: attempted-fixes
    attributes:
      label: Attempted fixes
      description: Mention reinstalling, clearing launcher cache, redownloading, changing Java, changing memory, or trying a clean profile.
      placeholder: "I tried..."
    validations:
      required: true

  - type: textarea
    id: logs-screenshots
    attributes:
      label: Logs or screenshots of the full error
      description: Required. Attach launcher logs, latest.log, or screenshots showing the full error window. Remove private information before posting.
      placeholder: "Drag and drop logs/screenshots here, or paste a link."
    validations:
      required: true
