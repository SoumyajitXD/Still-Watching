name: Installation or update issue
description: Report problems installing, updating, importing, or launching the official modpack files.
title: "[Install]: "
labels:
  - installation
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Use this when Still Watching fails to install, update, import, or launch before normal gameplay starts.

        Only report issues from official CurseForge files. GitHub ZIP installs, third-party repacks, and edited archives are not supported.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I downloaded or imported the pack from an official CurseForge source.
          required: true
        - label: I followed the installation guide before opening this issue.
          required: true
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I am not using the GitHub source ZIP as the playable modpack.
          required: true
  - type: dropdown
    id: issue-type
    attributes:
      label: Issue type
      options:
        - Cannot import pack
        - Download fails
        - Update fails
        - Missing files after install
        - Launcher profile will not create
        - Launcher profile created but will not launch
        - Dependency or mod resolution issue
        - Java or memory setup issue
        - Other
    validations:
      required: true
  - type: dropdown
    id: launcher
    attributes:
      label: Launcher
      options:
        - CurseForge App
        - Prism Launcher
        - ATLauncher
        - Modrinth App
        - Other
    validations:
      required: true
  - type: input
    id: launcher-version
    attributes:
      label: Launcher version
      placeholder: "Example: CurseForge 1.x / Prism 9.x"
  - type: input
    id: pack-version
    attributes:
      label: Still Watching version
      description: Use the exact CurseForge file/version name.
      placeholder: "Example: V1.0.x"
    validations:
      required: true
  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft version shown by launcher
      placeholder: "1.20.1"
    validations:
      required: true
  - type: input
    id: forge-version
    attributes:
      label: Forge version shown by launcher
      placeholder: "Forge 47.x.x"
  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: "Java 17"
    validations:
      required: true
  - type: input
    id: allocated-memory
    attributes:
      label: Allocated memory
      placeholder: "Example: 6 GB / 6144 MB"
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS / Linux distro"
    validations:
      required: true
  - type: textarea
    id: error-message
    attributes:
      label: Exact error message
      description: Paste the full launcher/game error text if one appears.
      placeholder: "Paste the full error here."
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: "Describe what failed and where it failed."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open launcher
        2. Import/update Still Watching
        3. Click...
        4. Error appears
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Launcher logs or game logs
      description: Attach launcher logs, latest.log, or screenshots of the full error. Remove private info before posting.
      placeholder: "Drag and drop logs here, or paste a link."
    validations:
      required: true
  - type: textarea
    id: attempted-fixes
    attributes:
      label: What have you tried?
      description: Mention reinstalling, clearing cache, changing Java, changing memory, redownloading, or using a clean profile.
      placeholder: "I tried..."
    validations:
      required: true
