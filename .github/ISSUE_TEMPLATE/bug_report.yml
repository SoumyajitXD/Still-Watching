name: Bug report
description: Report a reproducible gameplay, content, quest, worldgen, UI, audio, or balance bug.
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Use this for reproducible bugs in a clean Still Watching install.

        Crashes, install/update failures, server-only problems, and pure performance issues have their own templates. Use the right template so the report lands with the right context.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I tested this on the latest available Still Watching release from CurseForge.
          required: true
        - label: I reproduced this on a clean profile with no extra mods, shaders, resource packs, datapacks, or config edits unless listed below.
          required: true
        - label: This is not a crash, install/update failure, server-only problem, or performance-only problem.
          required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: Pick the impact.
      options:
        - Progression blocker
        - Major gameplay issue
        - Minor gameplay issue
        - Visual/audio/UI issue
        - Balance issue
        - Typo/text issue
        - Other
    validations:
      required: true
  - type: dropdown
    id: affected-area
    attributes:
      label: Affected area
      options:
        - Gameplay/mechanics
        - Quests/progression
        - World generation/structures
        - Mobs/entities
        - Items/blocks/recipes
        - UI/menus/tooltips
        - Audio/visuals
        - Config/balance
        - Documentation/text
        - Other
    validations:
      required: true
  - type: dropdown
    id: reproducibility
    attributes:
      label: How often does it happen?
      options:
        - Always
        - Often
        - Sometimes
        - Happened once
        - Unknown
    validations:
      required: true
  - type: input
    id: pack-version
    attributes:
      label: Still Watching version
      description: Use the exact CurseForge file/version name.
      placeholder: "Example: V1.0.x"
    validations:
      required: true
  - type: dropdown
    id: launcher
    attributes:
      label: Launcher
      options:
        - CurseForge App
        - Prism Launcher
        - ATLauncher
        - Modrinth App
        - Other
    validations:
      required: true
  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft version
      placeholder: "1.20.1"
    validations:
      required: true
  - type: input
    id: forge-version
    attributes:
      label: Forge version
      placeholder: "Forge 47.x.x"
  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: "Java 17"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS / Linux distro"
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Singleplayer
        - Multiplayer client
        - LAN
        - Dedicated server
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two clear sentences.
      placeholder: "When I..., the pack..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "I expected..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Make this precise enough that someone else can reproduce it.
      placeholder: |
        1. Create/load world
        2. Go to...
        3. Do...
        4. Bug happens
    validations:
      required: true
  - type: textarea
    id: world-context
    attributes:
      label: World/location context
      description: Write "Not relevant" if this does not apply.
      placeholder: |
        Seed:
        Dimension:
        Coordinates:
        Biome/structure:
        New world or existing world:
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Attach latest.log when relevant. Remove private tokens, IPs, and personal info before posting.
      placeholder: "Drag and drop logs here, or paste a link."
  - type: textarea
    id: media
    attributes:
      label: Screenshots/video
      description: Attach screenshots or video if they help explain the issue.
      placeholder: "Attach screenshots/video here if relevant."
  - type: textarea
    id: workaround
    attributes:
      label: Workaround
      description: Mention anything that avoids or temporarily fixes the issue.
      placeholder: "None found"
  - type: textarea
    id: modifications
    attributes:
      label: Extra mods, shaders, resource packs, datapacks, or config changes
      description: Write "None" if the install is clean.
      placeholder: "None"
    validations:
      required: true
