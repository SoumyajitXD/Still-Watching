name: Bug report
description: Report a reproducible gameplay, content, or modpack bug on a clean Still Watching install.
title: "[Bug]: "
labels:
  - bug
  - needs-triage

body:
  - type: markdown
    attributes:
      value: |
        Use this for reproducible bugs that are not crashes, installation failures, server-only problems, or pure performance issues. Those have their own templates.

        Reports need clear steps, exact versions, and logs when relevant. Guesswork is not a debugging strategy.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I tested this on the latest available Still Watching version.
          required: true
        - label: I reproduced this on a clean Still Watching profile without extra mods, shaders, resource packs, or config edits unless listed below.
          required: true
        - label: This is not a crash, installation/update issue, server-only issue, or performance-only issue.
          required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: Pick the impact, not the mood.
      options:
        - Progression blocker
        - Major gameplay issue
        - Minor gameplay issue
        - Visual/audio/UI issue
        - Balance issue
        - Other
    validations:
      required: true

  - type: dropdown
    id: affected-area
    attributes:
      label: Affected area
      options:
        - Gameplay/mechanics
        - Quests/progression
        - World generation/structures
        - Mobs/entities
        - Items/blocks/recipes
        - UI/menus/tooltips
        - Audio/visuals
        - Config/balance
        - Other
    validations:
      required: true

  - type: dropdown
    id: reproducibility
    attributes:
      label: How often does this happen?
      options:
        - Always
        - Often
        - Sometimes
        - Happened once
        - Unknown
    validations:
      required: true

  - type: input
    id: pack-version
    attributes:
      label: Still Watching version
      placeholder: "V1.0.x"
    validations:
      required: true

  - type: dropdown
    id: launcher
    attributes:
      label: Launcher
      options:
        - CurseForge App
        - Prism Launcher
        - ATLauncher
        - Modrinth App
        - Other
    validations:
      required: true

  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft version
      placeholder: "1.20.1"
    validations:
      required: true

  - type: input
    id: forge-version
    attributes:
      label: Forge version
      placeholder: "Forge 47.x.x"

  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: "Java 17"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS / Linux distro"
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Singleplayer
        - Multiplayer client
        - LAN
        - Dedicated server
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly, including what you were doing right before it happened.
      placeholder: "The bug happens when..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "I expected..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Give exact steps.
      placeholder: |
        1. Create/load world
        2. Go to...
        3. Do...
        4. Bug happens
    validations:
      required: true

  - type: textarea
    id: world-context
    attributes:
      label: World or location details
      description: Include seed, dimension, coordinates, structure/biome, and whether this is a new or existing world. Write "Not relevant" if it does not apply.
      placeholder: |
        Seed:
        Dimension:
        Coordinates:
        Biome/structure:
        New world or existing world:

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Attach latest.log when relevant. Remove private information before posting.
      placeholder: "Drag and drop logs here, or paste a link."

  - type: textarea
    id: media
    attributes:
      label: Screenshots or video
      description: Attach screenshots or videos if they help explain the issue.
      placeholder: "Attach screenshots/video here if relevant."

  - type: textarea
    id: workaround
    attributes:
      label: Workaround
      description: Mention anything that temporarily fixes or avoids the issue. Write "None found" if nothing worked.
      placeholder: "None found"

  - type: textarea
    id: modifications
    attributes:
      label: Extra mods, shaders, resource packs, or config changes
      description: Write "None" if the install is clean.
      placeholder: "None"
    validations:
      required: true
