name: Bug report
description: Reproducible gameplay/content bug that is not a crash, install, server, or performance-only problem.
title: "[Bug]: "
labels:
  - bug
  - needs-triage

body:
  - type: markdown
    attributes:
      value: |
        Use this for reproducible gameplay, content, quest, worldgen, mob, item, audio, visual, or config bugs.

        Do not use this for crashes, install/update/first-launch failures, multiplayer-only problems, or pure performance issues. Those have their own templates. Bad reports waste time; useful reports have versions, steps, context, and logs when relevant.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I tested this on the latest available Still Watching version.
          required: true
        - label: I tested this on a clean Still Watching profile without extra mods, shaders, resource packs, datapacks, or config edits unless listed below.
          required: true
        - label: This is not a crash, install/update issue, server/multiplayer-only issue, or performance-only issue.
          required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: Pick the impact, not the mood.
      options:
        - Data loss
        - Progression blocker
        - Major gameplay issue
        - Minor gameplay issue
        - Cosmetic/visual/audio issue
        - Question/unclear impact
    validations:
      required: true

  - type: dropdown
    id: affected-area
    attributes:
      label: Affected area
      options:
        - Gameplay/mechanics
        - Quests/progression
        - World generation/structures
        - Mobs/entities
        - Items/blocks/recipes
        - UI/menus/tooltips
        - Audio/visuals
        - Config/balance
        - Documentation text inside the pack
        - Other
    validations:
      required: true

  - type: dropdown
    id: affected-side
    attributes:
      label: Affected side
      options:
        - Client
        - Server
        - Both
        - Unknown
    validations:
      required: true

  - type: dropdown
    id: reproducibility
    attributes:
      label: Reproducibility
      options:
        - Always
        - Often
        - Sometimes
        - Once
        - Unknown
    validations:
      required: true

  - type: input
    id: pack-version
    attributes:
      label: Still Watching version
      description: Use the CurseForge file/version shown by your launcher.
      placeholder: "Example: V1.0.x / CurseForge file name"
    validations:
      required: true

  - type: dropdown
    id: pack-version-source
    attributes:
      label: Pack version source
      options:
        - CurseForge App
        - CurseForge ZIP/manual import
        - Server pack from CurseForge
        - Other
    validations:
      required: true

  - type: dropdown
    id: launcher
    attributes:
      label: Launcher
      options:
        - CurseForge App
        - Prism Launcher
        - ATLauncher
        - Modrinth App
        - Other
    validations:
      required: true

  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft version
      placeholder: "1.20.1"
    validations:
      required: true

  - type: input
    id: forge-version
    attributes:
      label: Forge version
      placeholder: "Forge 47.x.x"
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: "Java 17"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS / Linux distro"
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Singleplayer
        - Multiplayer client
        - LAN
        - Dedicated server
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly, including what you were doing right before it happened.
      placeholder: "The bug happens when..."
    validations:
      required: true

  - type: textarea
    id: expected-result
    attributes:
      label: Expected result
      placeholder: "I expected..."
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Give exact steps. If the steps are vague, the issue is dead on arrival.
      placeholder: |
        1. Create/load world
        2. Go to...
        3. Do...
        4. Bug happens
    validations:
      required: true

  - type: textarea
    id: world-location-details
    attributes:
      label: World or location details
      description: Include seed, dimension, coordinates, biome/structure, and whether this is a new or existing world. Write "Not relevant" if it does not apply.
      placeholder: |
        Seed:
        Dimension:
        Coordinates:
        Biome/structure:
        New world or existing world:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs, if relevant
      description: Required when applicable. Attach latest.log if the bug prints errors, breaks loading, affects saving, involves worldgen, or happens near a warning/error. Do not paste cropped log screenshots.
      placeholder: "Drag and drop logs here, or paste a link."

  - type: textarea
    id: screenshots-video
    attributes:
      label: Screenshots or video
      description: Attach screenshots or video if they make the bug obvious.
      placeholder: "Attach screenshots/video here if relevant."

  - type: textarea
    id: workaround
    attributes:
      label: Workaround
      description: Mention anything that temporarily fixes or avoids the issue. Write "None found" if nothing worked.
      placeholder: "None found"
    validations:
      required: true

  - type: textarea
    id: extra-content
    attributes:
      label: Extra mods, shaders, resource packs, datapacks, or config edits
      description: Write "None" if the install is clean. List both added and removed content.
      placeholder: "None"
    validations:
      required: true
