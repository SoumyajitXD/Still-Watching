name: Bug report
description: Report a reproducible gameplay or modpack bug on a clean Still Watching install.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Reproduce the issue on a clean Still Watching profile before submitting. Modified profiles are chaos soup until proven otherwise.
  - type: input
    id: pack-version
    attributes:
      label: Still Watching version
      description: Example: V1.0.2
      placeholder: V1.0.x
    validations:
      required: true
  - type: dropdown
    id: launcher
    attributes:
      label: Launcher
      options:
        - CurseForge App
        - Prism Launcher
        - ATLauncher
        - Modrinth App
        - Other
    validations:
      required: true
  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft version
      placeholder: "1.20.1"
    validations:
      required: true
  - type: input
    id: forge-version
    attributes:
      label: Forge version
      description: Include this if your launcher shows it.
      placeholder: "Forge 47.x.x"
  - type: input
    id: java-version
    attributes:
      label: Java version
      description: Include this if visible in launcher logs or crash reports.
      placeholder: "Java 17"
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS / Linux distro"
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Singleplayer
        - Multiplayer client
        - LAN
        - Dedicated server
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. Include what you expected and what happened instead.
      placeholder: "The game crashes when..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Give exact steps. No telepathy. No haunted postcards.
      placeholder: |
        1. Create/load world
        2. Go to...
        3. Do...
        4. Bug happens
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or crash report
      description: Attach latest.log or the crash report. Remove private info first.
      placeholder: "Drag and drop files here, or paste a link to a log upload."
    validations:
      required: true
  - type: textarea
    id: modifications
    attributes:
      label: Extra mods, shaders, resource packs, or config changes
      description: List anything you changed. Write "None" for a clean install.
      placeholder: "None"
    validations:
      required: true
